<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>note 投稿カレンダー</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bulma -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">

<style>
html, body {
  height: 100%;
  margin: 0;
}

#app {
  height: 100%;
  display: flex;
  flex-direction: column;
}

.calendar {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}

.day {
  border: 1px solid #ddd;
  padding: 4px;
  overflow-y: auto;
}

.day-number {
  font-size: 0.75rem;
  font-weight: bold;
  margin-bottom: 4px;
}

.article {
  font-size: 0.75rem;
  cursor: pointer;
  margin-bottom: 4px;
  word-break: break-word;
}

.article:hover {
  text-decoration: underline;
}

/* モーダル高速表示（アニメーション最小） */
.modal-card {
  max-height: 80vh;
}

.modal-card-body {
  overflow-y: auto;
  white-space: pre-wrap;
}

/* スワイプ用 */
.swipe-area {
  flex: 1;
  touch-action: pan-y;
}
</style>
</head>

<body>
<div id="app" class="p-3">

  <!-- ヘッダー -->
  <div class="level mb-2">
    <button class="button is-small" id="prevMonth">←</button>
    <div class="has-text-weight-bold" id="monthLabel"></div>
    <button class="button is-small" id="nextMonth">→</button>
  </div>

  <!-- カレンダー -->
  <div class="swipe-area">
    <div class="calendar" id="calendar"></div>
  </div>
</div>

<!-- モーダル -->
<div class="modal" id="modal">
  <div class="modal-background"></div>
  <div class="modal-card">
    <header class="modal-card-head">
      <p class="modal-card-title" id="modalTitle"></p>
      <button class="delete" aria-label="close"></button>
    </header>
    <section class="modal-card-body" id="modalBody"></section>
    <footer class="modal-card-foot">
      <a class="button is-link" id="modalLink" target="_blank">記事を開く</a>
    </footer>
  </div>
</div>

<script>
/* ========= 設定 ========= */
const USERS = [
  { id: "mumeino", official: false },
  { id: "info", official: true }
];

/* ========= 状態 ========= */
let current = new Date();
let articles = [];

/* ========= ダミーデータ（ここをrss2jsonで差し替え） ========= */
articles = [
  {
    title: "長いタイトルの記事でも省略されずに表示されます。これはテスト用のとても長いタイトルです。",
    content: "これは本文全文です。\n\nモーダルは即時表示されます。",
    date: "2026-01-10",
    url: "https://note.com/",
    official: false
  },
  {
    title: "note公式からのお知らせ",
    content: "公式記事の全文です。",
    date: "2026-01-15",
    url: "https://note.com/info",
    official: true
  }
];

/* ========= 描画 ========= */
function renderCalendar() {
  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  const year = current.getFullYear();
  const month = current.getMonth();

  document.getElementById("monthLabel").textContent =
    `${year}年 ${month + 1}月`;

  const firstDay = new Date(year, month, 1).getDay();
  const days = new Date(year, month + 1, 0).getDate();

  for (let i = 0; i < firstDay; i++) {
    cal.appendChild(document.createElement("div"));
  }

  for (let d = 1; d <= days; d++) {
    const cell = document.createElement("div");
    cell.className = "day";

    const num = document.createElement("div");
    num.className = "day-number";
    num.textContent = d;
    cell.appendChild(num);

    const dateKey =
      `${year}-${String(month + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;

    articles
      .filter(a => a.date === dateKey)
      .forEach(a => {
        const div = document.createElement("div");
        div.className = "article";
        div.textContent = (a.official ? "📢 " : "") + a.title;
        div.onclick = () => openModal(a);
        cell.appendChild(div);
      });

    cal.appendChild(cell);
  }
}

/* ========= モーダル ========= */
function openModal(article) {
  document.getElementById("modalTitle").textContent =
    (article.official ? "📢 " : "") + article.title;
  document.getElementById("modalBody").textContent = article.content;
  document.getElementById("modalLink").href = article.url;
  document.getElementById("modal").classList.add("is-active");
}

document.querySelector(".delete").onclick =
document.querySelector(".modal-background").onclick = () => {
  document.getElementById("modal").classList.remove("is-active");
};

/* ========= 月移動 ========= */
document.getElementById("prevMonth").onclick = () => {
  current.setMonth(current.getMonth() - 1);
  renderCalendar();
};

document.getElementById("nextMonth").onclick = () => {
  current.setMonth(current.getMonth() + 1);
  renderCalendar();
};

/* ========= スワイプ ========= */
let startX = null;
const swipe = document.querySelector(".swipe-area");

swipe.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

swipe.addEventListener("touchend", e => {
  if (startX === null) return;
  const dx = e.changedTouches[0].clientX - startX;
  if (dx > 80) current.setMonth(current.getMonth() - 1);
  if (dx < -80) current.setMonth(current.getMonth() + 1);
  startX = null;
  renderCalendar();
});

/* ========= 初期描画 ========= */
renderCalendar();
</script>
</body>
</html>
