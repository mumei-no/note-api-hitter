<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>note 投稿カレンダー</title>

  <!-- Bulma -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">

  <!-- TUI Calendar -->
  <link rel="stylesheet"
        href="https://uicdn.toast.com/calendar/latest/toastui-calendar.min.css">

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
    }

    .calendar-header {
      padding: 1rem;
      border-bottom: 1px solid #ddd;
    }

    .calendar-controls {
      margin-top: 0.5rem;
    }

    #calendar-wrapper {
      height: calc(100vh - 110px);
      overflow: hidden;
      touch-action: pan-y; /* ← 横スワイプのみ許可 */
    }

    #calendar {
      height: 100%;
    }

    .note-title {
      margin-left: 0.3em;
    }
  </style>
</head>
<body>

<!-- ヘッダー -->
<div class="calendar-header">
  <h1 class="title is-4">note 投稿カレンダー</h1>

  <div class="buttons calendar-controls">
    <button id="prevMonth" class="button is-small">◀ 前月</button>
    <button id="today" class="button is-small">今月</button>
    <button id="nextMonth" class="button is-small">次月 ▶</button>
  </div>
</div>

<!-- カレンダー -->
<div id="calendar-wrapper">
  <div id="calendar"></div>
</div>

<!-- モーダル -->
<div id="noteModal" class="modal">
  <div class="modal-background"></div>
  <div class="modal-card">
    <header class="modal-card-head">
      <p class="modal-card-title" id="modalTitle"></p>
      <button class="delete" aria-label="close"></button>
    </header>
    <section class="modal-card-body">
      <p class="has-text-grey is-size-7" id="modalDate"></p>
      <hr>
      <a id="modalLink" href="#" target="_blank"
         class="button is-link is-small">
        noteで記事を開く
      </a>
    </section>
  </div>
</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- dayjs -->
<script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>

<!-- TUI Calendar -->
<script src="https://uicdn.toast.com/calendar/latest/toastui-calendar.min.js"></script>

<!-- Hammer.js -->
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>

<script>
$(function () {

  const Calendar = tui.Calendar;
  const calendar = new Calendar('#calendar', {
    defaultView: 'month',
    taskView: false,
    scheduleView: false,
    useDetailPopup: false,
    useCreationPopup: false
  });

  /* --------- 月移動（ボタン） --------- */
  $('#prevMonth').on('click', () => calendar.prev());
  $('#nextMonth').on('click', () => calendar.next());
  $('#today').on('click', () => calendar.today());

  /* --------- スワイプ（月移動） --------- */
  const hammer = new Hammer(
    document.getElementById('calendar-wrapper')
  );

  hammer.get('swipe').set({
    direction: Hammer.DIRECTION_HORIZONTAL,
    threshold: 30
  });

  let swipeLock = false;

  function safeMove(action) {
    if (swipeLock) return;
    swipeLock = true;

    action();

    setTimeout(() => {
      swipeLock = false;
    }, 300);
  }

  hammer.on('swipeleft', () =>
    safeMove(() => calendar.next())
  );

  hammer.on('swiperight', () =>
    safeMove(() => calendar.prev())
  );

  /* --------- RSS --------- */
  const feeds = [
    { id: 'mumeino', prefix: '📝' },
    { id: 'info', prefix: '📢' }
  ];

  feeds.forEach(feed => {
    const rssUrl = `https://note.com/${feed.id}/rss`;
    const apiUrl =
      `https://api.allorigins.win/raw?url=${encodeURIComponent(rssUrl)}`;

    $.get(apiUrl, function (data) {
      $(data).find('item').each(function () {
        const title = $(this).find('title').text();
        const link = $(this).find('link').text();
        const date = new Date($(this).find('pubDate').text());

        calendar.createEvents([{
          id: link,
          calendarId: feed.id,
          title: `${feed.prefix}<span class="note-title">${title}</span>`,
          start: date,
          end: date,
          isReadOnly: true,
          raw: { title, link, date }
        }]);
      });
    });
  });

  /* --------- モーダル --------- */
  calendar.on('clickEvent', function (e) {
    const event = e.event;

    $('#modalTitle').text(event.raw.title);
    $('#modalDate').text(
      dayjs(event.raw.date).format('YYYY年MM月DD日 HH:mm')
    );
    $('#modalLink').attr('href', event.raw.link);

    $('#noteModal').addClass('is-active');
  });

  $('.modal-background, .modal .delete').on('click', function () {
    $('#noteModal').removeClass('is-active');
  });

});
</script>

</body>
</html>
