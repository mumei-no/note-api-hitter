<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>note カレンダー</title>

  <!-- Bulma -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">

  <!-- TUI Calendar CSS -->
  <link rel="stylesheet"
        href="https://uicdn.toast.com/calendar/latest/toastui-calendar.min.css">

  <style>
    body {
      padding: 1.5rem;
    }
    #calendar {
      height: 800px;
    }
    .note-title {
      margin-left: 0.3em;
    }
  </style>
</head>
<body>

<section class="section">
  <div class="container">
    <h1 class="title is-4">note 投稿カレンダー</h1>
    <div id="calendar"></div>
  </div>
</section>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- dayjs（★必須） -->
<script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>

<!-- TUI Calendar JS -->
<script src="https://uicdn.toast.com/calendar/latest/toastui-calendar.min.js"></script>

<script>
$(function () {

  const Calendar = tui.Calendar;

  const calendar = new Calendar('#calendar', {
    defaultView: 'month',
    taskView: false,
    scheduleView: false,
    useDetailPopup: false,
    useCreationPopup: false
  });

  const feeds = [
    { id: 'mumeino', prefix: '📝' },
    { id: 'info', prefix: '📢' }
  ];

  feeds.forEach(feed => {
    const rssUrl = `https://note.com/${feed.id}/rss`;
    const apiUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(rssUrl)}`;

    $.get(apiUrl, function (data) {
      $(data).find('item').each(function () {
        const title = $(this).find('title').text();
        const link = $(this).find('link').text();
        const date = new Date($(this).find('pubDate').text());

        calendar.createEvents([{
          id: link,
          calendarId: feed.id,
          title: `${feed.prefix}<span class="note-title">${title}</span>`,
          start: date,
          end: date,
          isReadOnly: true,
          raw: { link }
        }]);
      });
    });
  });

  calendar.on('clickEvent', function (e) {
    const link = e.event.raw.link;
    if (link) {
      window.open(link, '_blank');
    }
  });

});
</script>

</body>
</html>
