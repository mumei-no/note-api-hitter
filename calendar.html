<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>note 投稿カレンダー</title>

  <!-- Bootstrap 5 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- FullCalendar -->
  <link
    href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css"
    rel="stylesheet"
  >

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
    }

    .calendar-header {
      padding: 1rem;
      border-bottom: 1px solid #dee2e6;
    }

    #calendar-wrapper {
      height: calc(100vh - 110px);
    }

    #calendar {
      height: 100%;
    }

    .note-prefix {
      margin-right: 0.25em;
    }
  </style>
</head>
<body>

<!-- ヘッダー -->
<div class="calendar-header">
  <h1 class="h5 mb-2">note 投稿カレンダー</h1>

  <div class="btn-group">
    <button id="prevMonth" class="btn btn-sm btn-outline-secondary">◀ 前月</button>
    <button id="today" class="btn btn-sm btn-outline-secondary">今月</button>
    <button id="nextMonth" class="btn btn-sm btn-outline-secondary">次月 ▶</button>
  </div>
</div>

<!-- カレンダー -->
<div id="calendar-wrapper">
  <div id="calendar"></div>
</div>

<!-- モーダル -->
<div class="modal fade" id="noteModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle"></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p class="text-muted small" id="modalDate"></p>
        <a
          id="modalLink"
          href="#"
          target="_blank"
          class="btn btn-primary btn-sm"
        >
          noteで記事を開く
        </a>
      </div>
    </div>
  </div>
</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- Bootstrap JS -->
<script
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
></script>

<!-- FullCalendar -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<!-- Hammer.js（安全なスワイプ用） -->
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>

<script>
$(function () {

  const calendarEl = document.getElementById('calendar');
  const modal = new bootstrap.Modal(document.getElementById('noteModal'));

  const calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: 'dayGridMonth',
    themeSystem: 'bootstrap5',
    timeZone: 'local',
    headerToolbar: false,
    fixedWeekCount: false,

    eventClick(info) {
      info.jsEvent.preventDefault();

      $('#modalTitle').text(info.event.title);
      $('#modalDate').text(
        info.event.start.toLocaleString('ja-JP')
      );
      $('#modalLink').attr('href', info.event.url);

      modal.show();
    }
  });

  calendar.render();

  /* ---- ボタン操作 ---- */
  $('#prevMonth').on('click', () => calendar.prev());
  $('#nextMonth').on('click', () => calendar.next());
  $('#today').on('click', () => calendar.today());

  /* ---- スワイプ（月移動・安全版） ---- */
  const hammer = new Hammer(document.getElementById('calendar-wrapper'));
  hammer.on('swipeleft', () => calendar.next());
  hammer.on('swiperight', () => calendar.prev());

  /* ---- RSS取得（rss2json） ---- */
  const feeds = [
    { id: 'mumeino', prefix: '📝' },
    { id: 'info', prefix: '📢' }
  ];

  feeds.forEach(feed => {
    const rssUrl = `https://note.com/${feed.id}/rss`;
    const apiUrl =
      'https://api.rss2json.com/v1/api.json?rss_url=' +
      encodeURIComponent(rssUrl);

    $.getJSON(apiUrl, function (res) {
      if (!res.items) return;

      res.items.forEach(item => {
        calendar.addEvent({
          title: `${feed.prefix} ${item.title}`,
          start: new Date(item.pubDate),
          url: item.link,
          allDay: true
        });
      });
    });
  });

});
</script>

</body>
</html>
